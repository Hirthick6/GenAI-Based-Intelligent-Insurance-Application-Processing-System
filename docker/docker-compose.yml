version: '3.8'

services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: tce-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tce_project}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tce-network

  # Backend API Service
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: tce-backend
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@database:5432/${DB_NAME:-tce_project}
      
      # Email IMAP
      IMAP_SERVER: ${IMAP_SERVER:-imap.gmail.com}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_EMAIL: ${IMAP_EMAIL}
      IMAP_PASSWORD: ${IMAP_PASSWORD}
      IMAP_FOLDER: ${IMAP_FOLDER:-INBOX}
      
      # GenAI
      GROQ_API_KEY: ${GROQ_API_KEY}
      GENAI_PROVIDER: ${GENAI_PROVIDER:-groq}
      
      # Tesseract (Docker path)
      TESSERACT_CMD: /usr/bin/tesseract
      
      # File Storage
      UPLOAD_DIR: /app/uploads
      PROCESSED_DIR: /app/processed
      
      # Server
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: ${DEBUG:-false}
      
      # Auth
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-in-production}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 1440
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_processed:/app/processed
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tce-network

  # Frontend Web Application
  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: tce-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - tce-network

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  backend_processed:
    driver: local

networks:
  tce-network:
    driver: bridge
